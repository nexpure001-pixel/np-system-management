<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Export</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --accent: #e84545;
    --accent2: #2563eb;
    --tip-bg: #1e293b;
    --tip-text: #f1f5f9;
    --dot: 26px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .page-header {
    background: #1e293b;
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .page-header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .page-header .sub {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
  }

  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-required { background: #e84545; }
  .dot-caution  { background: #f59e0b; }
  .dot-info     { background: #2563eb; }

  /* ===== SCROLL WRAPPER ===== */
  .scroll-area {
    overflow-y: auto;
    padding: 24px;
    text-align: center;
  }

  /* ===== IMAGE CONTAINER ===== */
  .img-wrap {
    position: relative;
    display: inline-block;
    max-width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    border-radius: 4px;
    overflow: visible;
  }

  .img-wrap img {
    display: block;
    width: 100%;
    max-width: 1172px;
    height: auto;
    border-radius: 4px;
  }

  /* ===== HOTSPOT ===== */
  .hs {
    position: absolute;
    width: var(--dot);
    height: var(--dot);
    cursor: pointer;
    z-index: 20;
    transform: translate(-50%, -50%);
  }

  .hs-dot {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    z-index: 2;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .hs.type-required .hs-dot { background: var(--accent); box-shadow: 0 0 10px rgba(232,69,69,0.5); }
  .hs.type-caution  .hs-dot { background: #f59e0b;       box-shadow: 0 0 10px rgba(245,158,11,0.5); }
  .hs.type-info     .hs-dot { background: var(--accent2); box-shadow: 0 0 10px rgba(37,99,235,0.5); }

  .hs-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2.5px solid currentColor;
    animation: ripple 2s ease-out infinite;
    z-index: 1;
  }

  .hs-ring2 { animation-delay: 0.8s; }

  .hs.type-required .hs-ring { color: var(--accent); }
  .hs.type-caution  .hs-ring { color: #f59e0b; }
  .hs.type-info     .hs-ring { color: var(--accent2); }

  @keyframes ripple {
    0%   { transform: scale(0.85); opacity: 0.9; }
    100% { transform: scale(2.2);  opacity: 0; }
  }

  .hs:hover .hs-dot { transform: scale(1.18); }

  /* ===== TOOLTIP ===== */
  .tip {
    position: absolute;
    background: var(--tip-bg);
    color: var(--tip-text);
    border-radius: 10px;
    padding: 14px 18px;
    width: 260px;
    font-size: 12.5px;
    line-height: 1.7;
    z-index: 300;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: left;
  }

  .tip.show { opacity: 1; pointer-events: auto; }

  /* Positioning Logic - Simplified for export, default right/bottom if space allows */
  /* Default: Below */
  .tip { top: calc(var(--dot) / 2 + 10px); left: 50%; transform: translateX(-50%) translateY(6px); }
  .tip.show { transform: translateX(-50%) translateY(0); }

  .tip.above { bottom: calc(var(--dot) / 2 + 10px); top: auto; left: 50%; transform: translateX(-50%) translateY(-6px); }
  .tip.above.show { transform: translateX(-50%) translateY(0); }
  
  /* Arrow */
  .tip::before {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: var(--tip-bg);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-top: 1px solid rgba(255,255,255,0.08);
    transform: rotate(45deg);
    top: -6px; left: 50%; margin-left: -5px; 
  }
  .tip.above::before { top: auto; bottom: -6px; transform: rotate(225deg); }

  .tip-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .tag-required { background: rgba(232,69,69,0.2); color: #f87171; }
  .tag-caution  { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .tag-info     { background: rgba(37,99,235,0.2);  color: #60a5fa; }

  .tip-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
  }

  .tip-body { color: #94a3b8; font-size: 12px; }
  .tip-body strong { color: #e2e8f0; font-weight: 600; }

  .tip-note {
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.05);
    border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    font-size: 11px;
    color: #fbbf24;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>📋 マニュアル</h1>
    <div class="sub">🔵 アイコンにマウスを重ねると詳細が表示されます</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-required"></div>必須・重要</div>
    <div class="legend-item"><div class="legend-dot dot-caution"></div>注意事項</div>
    <div class="legend-item"><div class="legend-dot dot-info"></div>操作説明</div>
  </div>
</div>
