<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新人向けシステム仕様図解マニュアル</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 【修正パッチ】lucide-reactのUMDビルドが window.react (小文字) を参照してしまうバグを回避 -->
  <script>window.react = window.React;</script>
  
  <!-- Babel (JSXをブラウザで解釈するため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons (React UMD) -->
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>

  <style>
    /* --- Custom Styles for Animations --- */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fade-in-up 0.5s ease-out forwards;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    .animate-pulse-ring {
      animation: pulse-ring 2s infinite;
    }
    .flow-line {
      stroke-dasharray: 8;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -16; }
    }
    /* スクロールバー非表示用 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 selection:bg-indigo-200 selection:text-indigo-900">
  
  <!-- Reactの描画先 -->
  <div id="root"></div>

  <!-- アプリケーションのコード -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // 【修正】lucideライブラリの読み込みが失敗・遅延した場合でもエラーにならないようにフォールバックを追加
    const lucideIcons = window.lucide || window.Lucide || window.lucideReact || window.LucideReact || {};
    
    // アイコンが読み込めなかった場合の代替アイコン（画面クラッシュ回避用）
    const FallbackIcon = ({ size = 24, className = "", ...props }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    );

    const { 
      Users = FallbackIcon, Zap = FallbackIcon, DollarSign = FallbackIcon, Settings = FallbackIcon, 
      Rocket = FallbackIcon, Crown = FallbackIcon, Medal = FallbackIcon, User = FallbackIcon, 
      ShoppingBag = FallbackIcon, Smartphone = FallbackIcon, Store = FallbackIcon, Check = FallbackIcon, 
      AlertCircle = FallbackIcon, ArrowRight = FallbackIcon, Server = FallbackIcon, Database = FallbackIcon, 
      Globe = FallbackIcon, RefreshCcw = FallbackIcon, Activity = FallbackIcon, Play = FallbackIcon, 
      CheckCircle2 = FallbackIcon, Gift = FallbackIcon, TrendingUp = FallbackIcon, Plane = FallbackIcon, 
      Ticket = FallbackIcon, Building2 = FallbackIcon, ChevronRight = FallbackIcon, Share2 = FallbackIcon, 
      MousePointerClick = FallbackIcon, Target = FallbackIcon
    } = lucideIcons;

    // ==========================================
    // 1. 全体像＆登場人物 セクション
    // ==========================================
    const SectionOverview = () => {
      const characters = [
        { title: 'プレミアム', icon: Crown, type: 'ビジネス', color: 'bg-yellow-100 text-yellow-800 border-yellow-300', pt: '最大', desc: '全てのボーナスを最大還元率で受け取れる主役。' },
        { title: 'エコノミー', icon: Medal, type: 'ビジネス', color: 'bg-blue-100 text-blue-800 border-blue-300', pt: '中', desc: 'プレミアムより還元率に制限があるビジネス会員。' },
        { title: 'カスタマー', icon: User, type: 'ビジネス', color: 'bg-green-100 text-green-800 border-green-300', pt: '低', desc: '最低水準のボーナス。タイトルの獲得はできない。' },
        { title: '愛用会員', icon: ShoppingBag, type: '買い物専用', color: 'bg-pink-100 text-pink-800 border-pink-400 border-2 shadow-md relative', pt: 'なし', desc: '買い物だけを楽しむ会員。購入ポイントは紹介者の実績になる！' },
        { title: 'モニター', icon: Smartphone, type: 'お試し', color: 'bg-slate-100 text-slate-600 border-slate-300', pt: 'なし', desc: 'サンプル商品などをもらうお試し会員。' },
        { title: '出店者', icon: Store, type: '事業者', color: 'bg-slate-100 text-slate-600 border-slate-300', pt: 'なし', desc: '商品を出品する事業者。ボーナス権利はなし。' },
      ];

      return (
        <div className="space-y-10 animate-fade-in-up">
          <div className="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-3xl p-8 text-white shadow-2xl relative overflow-hidden">
            <div className="absolute top-0 right-0 opacity-10 pointer-events-none">
              <Globe size={300} className="transform translate-x-1/4 -translate-y-1/4" />
            </div>
            <div className="relative z-10">
              <h2 className="text-3xl font-extrabold mb-4 flex items-center gap-3">
                <Database className="text-indigo-400" size={36}/>
                ネクスピュア・システム全体像
              </h2>
              <p className="text-indigo-100 text-lg mb-8 max-w-2xl">
                このシステムは、ECサイトでの<strong className="text-pink-300 font-bold">「日常の買い物」</strong>と、
                ネットワークの<strong className="text-yellow-300 font-bold">「報酬計算」</strong>を、全自動で直結させる巨大なプラットフォームです。
              </p>
              
              <div className="flex flex-col md:flex-row items-center justify-center gap-4 bg-white/10 p-6 rounded-2xl backdrop-blur-sm">
                <div className="flex flex-col items-center p-4 bg-white/10 rounded-xl w-48 text-center">
                  <ShoppingBag size={48} className="text-pink-300 mb-2" />
                  <span className="font-bold">ネクスプレイス</span>
                  <span className="text-xs text-indigo-200">ECサイト (買い物・決済)</span>
                </div>
                
                <div className="flex flex-col items-center px-4">
                  <div className="flex items-center text-indigo-200 mb-1"><RefreshCcw size={16} className="mr-1 animate-spin-slow"/> リアルタイム連携</div>
                  <div className="h-2 w-32 bg-gradient-to-r from-pink-400 to-yellow-400 rounded-full"></div>
                  <div className="text-xs text-yellow-200 mt-1 font-bold">API通信</div>
                </div>

                <div className="flex flex-col items-center p-4 bg-white/10 rounded-xl w-48 text-center">
                  <Server size={48} className="text-yellow-300 mb-2" />
                  <span className="font-bold">ネクスピュア</span>
                  <span className="text-xs text-indigo-200">管理側 (自動ボーナス計算)</span>
                </div>
              </div>
            </div>
          </div>

          <div>
            <h3 className="text-2xl font-bold border-b-2 border-slate-200 pb-2 mb-6 flex items-center gap-2">
              <Users className="text-indigo-600" />
              STEP 1: 登場人物（会員タイプ）を覚えよう！
            </h3>
            <p className="mb-6 text-slate-600">
              システムには大きく分けて「ボーナスをもらう権利がある人（ビジネス）」と「それ以外の人」がいます。
              特に<strong className="text-pink-600 bg-pink-50 px-2 py-1 rounded">愛用会員</strong>の存在がこのシステムのキーポイントです。
            </p>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {characters.map((char, idx) => (
                <div key={idx} className={`border rounded-xl p-5 ${char.color} transition-transform hover:-translate-y-1`}>
                  {char.title === '愛用会員' && (
                    <span className="absolute -top-3 -right-3 bg-pink-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-bounce">
                      重要キーマン！
                    </span>
                  )}
                  <div className="flex justify-between items-start mb-3">
                    <div className="flex items-center gap-2 font-bold text-lg">
                      <char.icon size={24} /> {char.title}
                    </div>
                    <span className="text-xs font-bold px-2 py-1 bg-white/50 rounded-md">
                      {char.type}
                    </span>
                  </div>
                  <div className="mb-2 text-sm font-semibold bg-white/40 px-2 py-1 rounded inline-block">
                    ボーナス還元率: {char.pt}
                  </div>
                  <p className="text-sm leading-relaxed">{char.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 2. アクティブ条件 セクション
    // ==========================================
    const SectionActive = () => {
      const [contract, setContract] = useState(true);
      const [bizMember, setBizMember] = useState(true);
      const [selfPt, setSelfPt] = useState(15);
      const [fanPt, setFanPt] = useState(10);

      const totalPt = selfPt + fanPt;
      const isPtOk = totalPt >= 50;
      const isActive = contract && bizMember && isPtOk;

      return (
        <div className="space-y-8 animate-fade-in-up">
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
            <h3 className="text-2xl font-bold mb-4 flex items-center gap-2">
              <Activity className="text-emerald-500" />
              STEP 2: 超重要！「アクティブ」になるには？
            </h3>
            <p className="mb-8 text-slate-600">
              報酬をもらうためには、計算のタイミングで<strong className="text-emerald-600">「アクティブ（報酬獲得の権利がある状態）」</strong>である必要があります。
              以下のシミュレーターを動かして、3つの条件をクリアしてみましょう！
            </p>

            <div className="flex flex-col lg:flex-row gap-8">
              <div className="flex-1 space-y-6">
                <div className={`p-4 rounded-xl border-2 transition-colors ${contract ? 'bg-emerald-50 border-emerald-400' : 'bg-slate-50 border-slate-200'}`}>
                  <div className="flex items-center justify-between">
                    <div>
                      <h4 className="font-bold flex items-center gap-2">
                        {contract ? <CheckCircle2 className="text-emerald-500"/> : <AlertCircle className="text-slate-400"/>}
                        条件1: 契約日がある
                      </h4>
                      <p className="text-sm text-slate-500 mt-1">当月末までに契約締結日が登録されている</p>
                    </div>
                    <button onClick={() => setContract(!contract)} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${contract ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                      {contract ? 'クリア済み' : '未クリア'}
                    </button>
                  </div>
                </div>

                <div className={`p-4 rounded-xl border-2 transition-colors ${bizMember ? 'bg-emerald-50 border-emerald-400' : 'bg-slate-50 border-slate-200'}`}>
                  <div className="flex items-center justify-between">
                    <div>
                      <h4 className="font-bold flex items-center gap-2">
                        {bizMember ? <CheckCircle2 className="text-emerald-500"/> : <AlertCircle className="text-slate-400"/>}
                        条件2: ビジネス会員である
                      </h4>
                      <p className="text-sm text-slate-500 mt-1">プレミアム・エコノミー・カスタマーのいずれか</p>
                    </div>
                    <button onClick={() => setBizMember(!bizMember)} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${bizMember ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                      {bizMember ? 'クリア済み' : '未クリア'}
                    </button>
                  </div>
                </div>

                <div className={`p-5 rounded-xl border-2 transition-colors ${isPtOk ? 'bg-emerald-50 border-emerald-400' : 'bg-rose-50 border-rose-300'}`}>
                  <h4 className="font-bold flex items-center gap-2 mb-4">
                    {isPtOk ? <CheckCircle2 className="text-emerald-500"/> : <AlertCircle className="text-rose-500"/>}
                    条件3: 当月合計 50pt以上
                  </h4>
                  
                  <div className="space-y-4">
                    <div>
                      <div className="flex justify-between text-sm font-semibold mb-1">
                        <span className="text-indigo-700">自分の購入ポイント</span>
                        <span>{selfPt} pt</span>
                      </div>
                      <input type="range" min="0" max="60" value={selfPt} onChange={(e)=>setSelfPt(Number(e.target.value))} className="w-full accent-indigo-600" />
                    </div>
                    
                    <div>
                      <div className="flex justify-between text-sm font-semibold mb-1">
                        <span className="text-pink-600">直紹介した愛用会員の購入ポイント</span>
                        <span>{fanPt} pt</span>
                      </div>
                      <input type="range" min="0" max="60" value={fanPt} onChange={(e)=>setFanPt(Number(e.target.value))} className="w-full accent-pink-500" />
                      <p className="text-xs text-slate-500 mt-1">💡 新人ポイント: 自分が買わなくても、紹介した愛用会員が買ってくれれば合算されます！</p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 rounded-2xl border border-slate-200 p-8 text-center relative overflow-hidden">
                {isActive && <div className="absolute inset-0 bg-emerald-500/10 pointer-events-none"></div>}
                
                <div className="mb-4">
                  <div className="text-slate-500 font-bold mb-2">当月合計ポイント</div>
                  <div className="flex items-baseline justify-center gap-2">
                    <span className={`text-6xl font-black ${isPtOk ? 'text-emerald-500' : 'text-slate-700'}`}>{totalPt}</span>
                    <span className="text-xl font-bold text-slate-400">/ 50 pt</span>
                  </div>
                  <div className="flex items-center justify-center gap-2 mt-2 text-sm font-bold">
                    <span className="text-indigo-600 bg-indigo-100 px-2 py-1 rounded">自分: {selfPt}pt</span>
                    <span>+</span>
                    <span className="text-pink-600 bg-pink-100 px-2 py-1 rounded">愛用会員: {fanPt}pt</span>
                  </div>
                </div>

                <div className="h-px w-full bg-slate-200 my-6"></div>

                <div className="mb-4">
                  <div className="text-slate-500 font-bold mb-2">現在の状態</div>
                  {isActive ? (
                    <div className="relative">
                      <div className="animate-pulse-ring absolute inset-0 rounded-full"></div>
                      <div className="bg-emerald-500 text-white text-3xl font-black px-8 py-4 rounded-full shadow-lg relative z-10 flex items-center gap-3 transform transition-transform hover:scale-105">
                        <Zap size={32} />
                        ACTIVE !!
                      </div>
                      <p className="mt-4 text-emerald-600 font-bold">おめでとうございます！報酬獲得の権利があります。</p>
                    </div>
                  ) : (
                    <div className="bg-slate-200 text-slate-500 text-xl font-bold px-8 py-4 rounded-full inline-flex items-center gap-3">
                      <AlertCircle size={24} />
                      非アクティブ (権利なし)
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 3. ボーナス大解剖 セクション
    // ==========================================
    const SectionBonus = () => {
      return (
        <div className="space-y-8 animate-fade-in-up">
          <h3 className="text-2xl font-bold flex items-center gap-2 mb-2">
            <DollarSign className="text-amber-500" />
            STEP 3: 報酬（ボーナス）の仕組み 大解剖
          </h3>
          <p className="text-slate-600 mb-6">ネクスピュアには複数のボーナスが存在します。それぞれ「何に対して」「いくら」支払われるのかを整理しました。</p>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white rounded-2xl shadow-sm border-2 border-indigo-200 p-6 lg:col-span-2 relative overflow-hidden">
              <div className="absolute top-0 right-0 bg-indigo-500 text-white text-xs font-bold px-4 py-1 rounded-bl-lg">最も重要</div>
              <h4 className="text-xl font-bold text-indigo-900 mb-2 flex items-center gap-2">
                <Share2 className="text-indigo-500"/>
                ② バイナリーボーナス（左右の小さい方で計算）
              </h4>
              <p className="text-slate-600 mb-6 text-sm">自分の組織を「左」と「右」に分け、<strong>ポイントが少ない方（小系列）</strong>を基準に支払われます。</p>

              <div className="flex flex-col md:flex-row items-center justify-center gap-8 bg-slate-50 p-6 rounded-xl">
                <div className="flex flex-col items-center">
                  <div className="w-32 h-40 bg-slate-200 rounded-t-xl flex items-center justify-center relative border border-slate-300">
                    <div className="absolute -top-3 bg-slate-600 text-white text-xs px-3 py-1 rounded-full font-bold">左グループ</div>
                    <div className="text-center">
                      <div className="text-2xl font-black text-slate-700">26,000</div>
                      <div className="text-sm font-bold text-slate-500">pt</div>
                    </div>
                  </div>
                  <div className="text-xs text-slate-500 mt-2">余った分は翌月繰越</div>
                </div>

                <div className="flex flex-col items-center justify-center gap-2">
                  <div className="text-sm font-bold text-slate-400">比較</div>
                  <ChevronRight size={32} className="text-indigo-300" />
                </div>

                <div className="flex flex-col items-center">
                  <div className="w-32 h-28 bg-pink-100 rounded-t-xl flex items-center justify-center relative shadow-[0_0_15px_rgba(236,72,153,0.3)] ring-4 ring-pink-300 border border-pink-400">
                    <div className="absolute -top-3 bg-pink-500 text-white text-xs px-3 py-1 rounded-full font-bold animate-bounce">右グループ (少ない方!)</div>
                    <div className="text-center">
                      <div className="text-2xl font-black text-pink-600">8,000</div>
                      <div className="text-sm font-bold text-pink-500">pt</div>
                    </div>
                  </div>
                  <div className="text-xs text-pink-600 font-bold mt-2 flex items-center gap-1"><Check size={14}/>ここが計算基準！</div>
                </div>
              </div>
              
              <div className="mt-6 bg-indigo-50 border border-indigo-100 rounded-lg p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                 <div className="font-bold text-indigo-900">
                    計算式: <span className="bg-white px-2 py-1 rounded text-pink-600 mx-1">8,000 pt</span> × <span className="bg-white px-2 py-1 rounded text-indigo-600 mx-1">あなたの還元率(%)</span>
                 </div>
                 <div className="flex gap-2 text-sm font-semibold">
                    <span className="bg-white px-2 py-1 rounded border border-slate-200 text-slate-600">カス: 5%</span>
                    <span className="bg-white px-2 py-1 rounded border border-blue-200 text-blue-700">エコ: 8%</span>
                    <span className="bg-white px-2 py-1 rounded border border-yellow-300 text-yellow-700 shadow-sm">プレ: 12〜18%</span>
                 </div>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
              <h4 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <Target className="text-blue-500"/>
                ① ダイレクトコミッション
              </h4>
              <p className="text-slate-600 text-sm mb-3">一番シンプル！<strong>「10%」</strong>と覚えましょう。</p>
              <ul className="space-y-2 text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                <li className="flex items-start gap-2"><Check size={16} className="text-emerald-500 mt-0.5 shrink-0"/><strong>直紹介:</strong> 直接紹介した人が買った商品のpt × 10%</li>
                <li className="flex items-start gap-2"><Check size={16} className="text-emerald-500 mt-0.5 shrink-0"/><strong>自己購入:</strong> 自分自身が買った商品のpt × 10%</li>
              </ul>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
              <h4 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <Users className="text-purple-500"/>
                ③ マッチングボーナス
              </h4>
              <p className="text-slate-600 text-sm mb-3">自分が直接紹介した人が「②バイナリーボーナス」を獲得すると、その額の<strong>10%</strong>が自分にも入ります。</p>
              <ul className="space-y-2 text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                <li><strong>アクティブ1人:</strong> 子（1段目）のボーナスの10%</li>
                <li><strong>アクティブ2人:</strong> 孫（2段目）まで</li>
                <li><strong>アクティブ3人以上:</strong> ひ孫（3段目）まで！</li>
              </ul>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
              <h4 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <Medal className="text-orange-500"/>
                ④ タイトル差額ボーナス
              </h4>
              <p className="text-slate-600 text-sm mb-3">プレミアム＆2スター以上の特権。「自分のタイトルの％」から「すぐ下の人の％」を引いた差額がもらえます。</p>
              <div className="flex flex-wrap gap-2 text-xs font-bold mt-2">
                 <span className="bg-slate-100 px-2 py-1 rounded">2★: 2%</span>
                 <span className="bg-slate-100 px-2 py-1 rounded">3★: 4%</span>
                 <span className="bg-slate-100 px-2 py-1 rounded">...</span>
                 <span className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded">7★: 12%</span>
              </div>
